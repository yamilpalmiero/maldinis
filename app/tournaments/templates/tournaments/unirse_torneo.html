{% extends "base.html" %}

{% block title %}Unirse a un Torneo — Maldinis{% endblock %}

{% block content %}
<div class="form-container">
    <h1>Unirse a un Torneo</h1>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="invite_code">Código de invitación</label>
            <input type="text" id="invite_code" name="invite_code" placeholder="Ej: AX7K29BQ" required autofocus maxlength="8">
        </div>
        <button type="submit" class="btn-primary">Unirse</button>
        <a href="{% url 'mis_torneos' %}" class="btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
