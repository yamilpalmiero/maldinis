databases:
  - name: maldinis-db
    databaseName: maldinis
    user: maldinis
    plan: free

services:
  - type: web
    name: maldinis
    plan: free
    runtime: python
    buildCommand: "pip install -r requirements.txt && python app/manage.py collectstatic --no-input && python app/manage.py migrate && python app/manage.py loaddata app/predictions/fixtures/teams.json && python app/manage.py loaddata app/predictions/fixtures/matches.json && python app/manage.py crear_superusuario"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: maldinis-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.0"